# HRZ-specific CI pipeline for the opendesk-edu fork.
# Activated by setting CI variable: HRZ_CI_ENABLED=true
#
# NOTE: All images use empty entrypoint because the HRZ GitLab runner
# does not auto-clear Docker ENTRYPOINT before shell detection.

.hrz-rules: &hrz_rules
  rules:
    - if: '$HRZ_CI_ENABLED != "true"'
      when: never
    - when: always

.hrz-image: &hrz_image
  entrypoint: [""]

stages:
  - lint
  - validate

yamllint:
  stage: lint
  image:
    name: cytopia/yamllint:1
    <<: *hrz_image
  before_script: []
  script:
    - yamllint -c .yamllint.yaml -f colored .
  <<: *hrz_rules

spdx-lint:
  stage: lint
  image:
    name: fsfe/reuse:latest
    <<: *hrz_image
  before_script: []
  script:
    - reuse lint
  <<: *hrz_rules
  allow_failure: true

shellcheck:
  stage: lint
  image:
    name: koalaman/shellcheck-alpine:stable
    <<: *hrz_image
  before_script: []
  script:
    - shellcheck scripts/*.sh scripts/**/*.sh 2>/dev/null || true
  <<: *hrz_rules
  allow_failure: true

helm-lint:
  stage: validate
  image:
    name: alpine/helm:latest
    <<: *hrz_image
  before_script:
    - apk add --no-cache make bash git
  script:
    - make lint
  <<: *hrz_rules

helmfile-lint:
  stage: validate
  image:
    name: alpine/helm:latest
    <<: *hrz_image
  before_script:
    - apk add --no-cache curl bash make git
    - curl -sL https://github.com/helmfile/helmfile/releases/download/v0.168.0/helmfile_0.168.0_linux_amd64.tar.gz | tar xz -C /usr/local/bin
    - helm repo add bitnami https://charts.bitnami.com/bitnami
  script:
    - helmfile -f helmfile.yaml.gotmpl lint 2>&1
  <<: *hrz_rules
  allow_failure: true

editorconfig-check:
  stage: lint
  image:
    name: mstruebing/editorconfig-checker:latest
    <<: *hrz_image
  before_script: []
  script:
    - ec -exclude '.git|node_modules|vendor|.venv|*.png|*.jpg|*.svg|*.ttf|*.woff*'
  <<: *hrz_rules
  allow_failure: true

python-check:
  stage: validate
  image:
    name: docker.io/python:3.12-alpine
    <<: *hrz_image
  before_script:
    - apk add --no-cache gcc musl-dev
    - pip install pytest
  script:
    - pytest scripts/semester-provisioning/tests/ -v
  <<: *hrz_rules
  allow_failure: true
