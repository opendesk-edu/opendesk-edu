---
apiVersion: "kyverno.io/v1"
kind: "ClusterPolicy"
metadata:
  name: "disallow-default-serviceaccount"
spec:
  background: true
  rules:
    - match:
        resources:
          kinds:
            - "Pod"
      name: "require-sa"
      validate:
        message: "serviceAccountName must be set to anything other than 'default'."
        pattern:
          spec:
            serviceAccountName: "!default"
  validationFailureAction: "audit"
...
