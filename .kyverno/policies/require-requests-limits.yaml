---
apiVersion: "kyverno.io/v1"
kind: "ClusterPolicy"
metadata:
  name: "require-requests-limits"
spec:
  background: true
  rules:
    - match:
        resources:
          kinds:
            - "Pod"
      name: "validate-resources"
      validate:
        message: "CPU and memory resource requests and limits are required."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    memory: "?*"
                  requests:
                    cpu: "?*"
                    memory: "?*"
  validationFailureAction: "audit"
...
