# Ralph Loop Configuration: HRZ Deployment Continuous Improvement
# This configuration defines the Ralph loop for the HRZ deployment

version: "1.0"
loop:
  name: "hrz-deployment-improvement"
  description: "Continuous improvement loop for HRZ openDesk Edu deployment"
  interval: "weekly"
  max_iterations: 52
  enabled: true

# Workspace configuration
workspace:
  primary_repo: "/home/weissto_local/git/opendesk_git"
  documentation_repo: "/home/weissto_local/git/opendesk-edu"
  website_repo: "/home/weissto_local/git/opendesk-edu-website"
  server_host: "178.254.2.90"
  server_user: "weiss"

# Focus areas for the Ralph loop
focus_areas:
  - name: "HRZ Deployment Health"
    description: "Monitor and improve the HRZ deployment"
    priority: 1
    tasks:
      - id: "check-containers"
        description: "Verify all containers are running"
        command: |
          curl -s -o /dev/null -w "chemie-lernen.org: %{http_code}\n" https://chemie-lernen.org/
          curl -s -o /dev/null -w "opendesk-edu.org: %{http_code}\n" https://opendesk-edu.org/
          curl -s -o /dev/null -w "landscape.opendesk-edu.org: %{http_code}\n" https://landscape.opendesk-edu.org/
          curl -s -o /dev/null -w "openspec.opendesk-edu.org: %{http_code}\n" https://openspec.opendesk-edu.org/
        expected_output: "All domains return 200 or 3xx"

      - id: "check-resources"
        description: "Check disk and memory usage"
        command: "df -h && free -h"
        threshold: "Disk > 80% or Memory > 90% triggers alert"

      - id: "check-https"
        description: "Verify all subdomains respond over HTTPS"
        command: |
          for domain in chemie-lernen.org opendesk-edu.org landscape.opendesk-edu.org openspec.opendesk-edu.org; do
            status=$(curl -sk -o /dev/null -w "%{http_code}" "https://$domain/")
            echo "$domain: $status"
          done
        expected_output: "All domains return 200 or 3xx"

      - id: "check-traefik"
        description: "Verify Traefik is routing correctly"
        command: "docker ps | grep traefik | wc -l"
        expected_output: "1"

  - name: "Centralized Logging"
    description: "Improve the centralized logging with Loki/Promtail/Grafana"
    priority: 2
    tasks:
      - id: "check-loki"
        description: "Verify Loki is running and ingesting logs"
        command: "curl -s http://178.254.2.90:3100/ready"
        expected_output: "ready"

      - id: "check-promtail"
        description: "Verify Promtail is collecting container logs"
        command: "curl -s -o /dev/null -w '%{http_code}' http://178.254.2.90:9080/"
        expected_output: "200"

      - id: "query-logs"
        description: "Test log queries via Loki API"
        command: |
          curl -G -s "http://178.254.2.90:3100/loki/api/v1/query" \
            --data-urlencode 'query={container="hugo-chemie-lernen-org"}' \
            --data-urlencode 'limit=5'
        expected_output: "Log entries returned"

      - id: "check-loki-storage"
        description: "Check Loki storage usage"
        command: "curl -s http://178.254.2.90:3100/metrics | grep -i 'loki_ingester' | head -5"
        expected_output: "Loki metrics available"

  - name: "Service Availability"
    description: "Monitor all public-facing services"
    priority: 3
    tasks:
      - id: "check-ssl"
        description: "Verify SSL certificates are valid"
        command: |
          for domain in chemie-lernen.org opendesk-edu.org landscape.opendesk-edu.org openspec.opendesk-edu.org; do
            expiry=$(echo | openssl s_client -servername $domain -connect $domain:443 2>/dev/null | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
            echo "$domain expires: $expiry"
          done

      - id: "check-redirects"
        description: "Verify HTTPS redirects work"
        command: |
          for domain in opendesk-edu.org landscape.opendesk-edu.org openspec.opendesk-edu.org; do
            result=$(curl -sk -o /dev/null -w "%{http_code} -> %{redirect_url}" "http://$domain/")
            echo "$domain: $result"
          done

      - id: "check-response-time"
        description: "Measure response times"
        command: |
          for domain in chemie-lernen.org opendesk-edu.org landscape.opendesk-edu.org openspec.opendesk-edu.org; do
            time=$(curl -sk -o /dev/null -w "%{time_total}" "https://$domain/")
            echo "$domain: ${time}s"
          done

  - name: "Documentation Sync"
    description: "Keep documentation in sync with code"
    priority: 4
    tasks:
      - id: "check-spec-freshness"
        description: "Check if OpenSpec is up to date"
        command: "git log --oneline -1 openspec/"
        expected_output: "Recent commits in spec files"

      - id: "check-articles-freshness"
        description: "Verify articles are recent"
        command: "find articles/ -name '*.md' -mtime -30 2>/dev/null | wc -l"
        expected_output: ">= 3 recent articles"

      - id: "check-papers-freshness"
        description: "Verify research papers are recent"
        command: "find papers/ -name '*.md' -mtime -90 2>/dev/null | wc -l"
        expected_output: ">= 1 recent paper"

  - name: "Loki/Promtail Optimization"
    description: "Optimize the centralized logging stack"
    priority: 5
    tasks:
      - id: "check-loki-config"
        description: "Verify Loki configuration is optimized"
        command: "ls -la /opt/git/docker-traefik/"
        expected_output: "Loki and Promtail configs present"

      - id: "check-log-retention"
        description: "Check log retention policies"
        command: |
          curl -s http://178.254.2.90:3100/config | python3 -c "import sys, json; d=json.load(sys.stdin); print('Retention:', d.get('limits_config', {}).get('retention_period', 'default'))"
        expected_output: "Retention period configured"

      - id: "check-promtail-discovery"
        description: "Verify Promtail is discovering all containers"
        command: |
          curl -s http://178.254.2.90:9080/targets | python3 -c "import sys, json; d=json.load(sys.stdin); print('Active targets:', len(d.get('activeTargets', [])))"
        expected_output: "All containers discovered"

# Reporting
reporting:
  output_dir: ".ralph/reports"
  format: "markdown"
  include_metrics: true
  include_logs: true
  include_recommendations: true

# Actions
actions:
  on_failure:
    - log_error
    - create_report

  on_success:
    - log_success
    - update_metrics

# Notifications
notifications:
  email:
    enabled: false

  log_file: "/var/log/ralph/loop.log"
  max_size_mb: 100

# Safety
safety:
  max_disk_usage_percent: 85
  require_confirmation_for_destructive: false
  dry_run_first: false
