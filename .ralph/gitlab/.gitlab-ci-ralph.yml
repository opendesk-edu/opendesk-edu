# GitLab CI/CD configuration for the Ralph Loop
# This pipeline runs the Ralph loop weekly and reports results

stages:
  - audit
  - report
  - notify

variables:
  PYTHON_IMAGE: "python:3.11-slim"
  RALPH_DIR: "$CI_PROJECT_DIR/.ralph"
  RALPH_CONFIG: "$RALPH_DIR/config.yaml"

.ralph_base:
  image: $PYTHON_IMAGE
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq openssl curl git
    - pip install -q -r $RALPH_DIR/requirements.txt 2>/dev/null || pip install -q pyyaml
  cache:
    key: ralph-cache
    paths:
      - .cache/pip/
  artifacts:
    paths:
      - .ralph/reports/
    expire_in: 30 days
    when: always

ralph:audit:
  extends: .ralph_base
  stage: audit
  script:
    - echo "Starting Ralph loop iteration"
    - python3 $RALPH_DIR/loop.py $RALPH_CONFIG
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - .ralph/**

ralph:report:
  extends: .ralph_base
  stage: report
  needs: ["ralph:audit"]
  script:
    - echo "Generating Ralph loop report"
    - if [ -d "$RALPH_DIR/reports" ]; then
    -   ls -la $RALPH_DIR/reports/
    -   LATEST=$(ls -t $RALPH_DIR/reports/*.md 2>/dev/null | head -1)
    -   if [ -n "$LATEST" ]; then
    -     echo "Latest report: $LATEST"
    -     cat "$LATEST"
    -   fi
    - fi
  artifacts:
    paths:
      - .ralph/reports/
    expire_in: 90 days
    when: always

ralph:notify:
  extends: .ralph_base
  stage: notify
  needs: ["ralph:report"]
  script:
    - echo "Sending notifications"
    - if [ -f "$RALPH_DIR/notifications/notify.sh" ]; then
    -   bash $RALPH_DIR/notifications/notify.sh
    - else
    -   echo "No notification script configured (skipping)"
    - fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
