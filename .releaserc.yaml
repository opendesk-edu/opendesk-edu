version: 1
hooks:
  pre:
    - python3 scripts/release/bump-charts.py
    - git add helmfile/charts/*/Chart.yaml
    - git commit -m "chore(release): bump chart versions [skip ci]" || true
  post:
    - |
      if git remote get-url github &>/dev/null; then
        git push github main --tags 2>/dev/null || echo "warning: sync to github failed"
      fi
      if git remote get-url opencode-de &>/dev/null; then
        git push opencode-de main --tags 2>/dev/null || echo "warning: sync to opencode-de failed"
      fi
branches:
  - main
ci: true
git: true
github: false
gitlab: false
gitea: true
tagPrefix: edu-v
