---
when:
  - event: [push, manual]
    branch: [main]
    paths:
      - "**/Dockerfile*"
      - ".woodpecker/build.yaml"
  - event: [manual]

matrix:
  IMAGE:
    - sogo
    - moodle
    - bigbluebutton
    - opencloud
    - typo3
    - ilias-shibboleth
    - user-import
    - semester-provisioning
    - collab-dashboard

steps:
  - name: resolve
    image: docker.io/alpine:3.21
    depends_on: []
    commands:
      - apk add --no-cache yq

      - VERSION="$(yq '.softwareVersion' publiccode.yml)-${CI_COMMIT_SHA:0:7}"
      - echo "VERSION_TAG=${VERSION}" >> /woodpecker/env/env

      - |
        case "${IMAGE}" in
          sogo)
            DOCKERFILE="helmfile/charts/sogo/Dockerfile"; CONTEXT="helmfile/charts/sogo/" ;;
          moodle)
            DOCKERFILE="helmfile/charts/moodle/Dockerfile"; CONTEXT="helmfile/charts/moodle/" ;;
          bigbluebutton)
            DOCKERFILE="helmfile/charts/bigbluebutton/Dockerfile"; CONTEXT="helmfile/charts/bigbluebutton/" ;;
          opencloud)
            DOCKERFILE="helmfile/charts/opencloud/Dockerfile"; CONTEXT="helmfile/charts/opencloud/" ;;
          typo3)
            DOCKERFILE="helmfile/apps/typo3/Dockerfile"; CONTEXT="helmfile/apps/typo3/" ;;
          ilias-shibboleth)
            DOCKERFILE="helmfile/apps/ilias/Dockerfile.shibboleth-source"; CONTEXT="helmfile/apps/ilias/" ;;
          user-import)
            DOCKERFILE="scripts/user_import/Dockerfile"; CONTEXT="scripts/user_import/" ;;
          semester-provisioning)
            DOCKERFILE="scripts/semester-provisioning/Dockerfile"; CONTEXT="scripts/semester-provisioning/" ;;
          collab-dashboard)
            DOCKERFILE="collab-dashboard/Dockerfile"; CONTEXT="collab-dashboard/" ;;
        esac
      - echo "DOCKERFILE=${DOCKERFILE}" >> /woodpecker/env/env
      - echo "CONTEXT=${CONTEXT}" >> /woodpecker/env/env

  - name: build-and-push
    image: docker.io/woodpeckerci/plugin-docker-buildx:5.0.0
    depends_on: [resolve]
    settings:
      registry: codeberg.org
      repo: "${CI_REPO_OWNER}/${IMAGE}"
      dockerfile: "${DOCKERFILE}"
      context: "${CONTEXT}"
      tags:
        - "${VERSION_TAG}"
        - latest
      build_args:
        - VERSION=${VERSION_TAG}
      cache_from: "${CI_REPO_OWNER}/${IMAGE}:latest"
    environment:
      DOCKER_USERNAME: "${CI_REPO_OWNER}"
      DOCKER_PASSWORD: "${CI_REGISTRY_TOKEN}"
    when:
      - event: [push, manual]
        branch: [main]
        status: [success]

  - name: trivy-sbom
    image: docker.io/aquasec/trivy:latest
    depends_on: [build-and-push]
    commands:
      - trivy image --format spdx-json --output /tmp/${IMAGE}.spdx.json "${CI_REPO_OWNER}/${IMAGE}:${VERSION_TAG}" || true
      - trivy image --severity CRITICAL,HIGH --exit-code 0 "${CI_REPO_OWNER}/${IMAGE}:${VERSION_TAG}" || true
    when:
      - event: [push, manual]
        branch: [main]
        status: [success]

  - name: cosign-sign
    image: docker.io/bitnami/cosign:latest
    depends_on: [build-and-push]
    commands:
      - cosign sign --yes "${CI_REPO_OWNER}/${IMAGE}:${VERSION_TAG}" 2>/dev/null || echo "cosign signing skipped"
      - cosign sign --yes "${CI_REPO_OWNER}/${IMAGE}:latest" 2>/dev/null || true
    when:
      - event: [push, manual]
        branch: [main]
        status: [success]
