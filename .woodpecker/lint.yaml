when:
  - event: [push, pull_request]

steps:
  - name: helm-lint
    image: docker.io/alpine/helm:3.17.0
    depends_on: []
    commands:
      - helm lint helmfile/charts/*/

  - name: yamllint
    image: docker.io/pipelinecomponents/yamllint:0.35.9
    depends_on: []
    commands:
      - yamllint -c .yamllint helmfile/charts/ docs/ .github/ publiccode.yml

  - name: ruff-python
    image: python:3.12-slim
    depends_on: []
    commands:
      - pip install ruff
      - ruff check scripts/

  - name: commitlint
    image: node:20-slim
    depends_on: []
    commands:
      - npm install -g @commitlint/cli @commitlint/config-conventional
      - echo "$CI_COMMIT_MESSAGE" | commitlint

  - name: spellcheck
    image: node:20-slim
    depends_on: []
    commands:
      - npm install -g cspell
      - cspell --config cspell.json README.md ROADMAP.md CONTRIBUTING.md docs/university-apps-concept.md docs/external-services.md docs/getting-started.md .github/ --no-progress

  - name: helm-template
    image: docker.io/alpine/helm:3.17.0
    depends_on: []
    commands:
      - for chart in helmfile/charts/*/; do helm template test "$chart" --dependency-update > /dev/null; done

  - name: pre-commit
    image: python:3.12-slim
    depends_on: []
    commands:
      - pip install pre-commit
      - pre-commit run --all-files
