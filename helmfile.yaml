---
environments:
  dev:
    values:
      - "helmfile/environments/dev/values.yaml.gotmpl"
  test:
    values:
      - "helmfile/environments/test/values.yaml.gotmpl"
  prod:
    values:
      - "helmfile/environments/prod/values.yaml.gotmpl"
---
# yamllint disable
helmfiles:
  - path: "./helmfile_generic.yaml"
    values:
      - {{ toYaml .Values | nindent 8 }}
