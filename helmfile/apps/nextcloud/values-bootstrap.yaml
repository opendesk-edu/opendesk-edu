---
config:
  administrator:
    username: "nextcloud"

  apps:
    integrationSwp:
      username: "opendesk_username"
    userOidc:
      username: "opendesk-nextcloud"
      userIdAttribute: "opendesk_useruuid"

  cryptpad:
    enabled: true

containerSecurityContext:
  allowPrivilegeEscalation: false
  enabled: true
  seccompProfile:
    type: "RuntimeDefault"
  readOnlyRootFilesystem: false
  runAsNonRoot: false

podSecurityContext:
  enabled: true
  fsGroup: 33
  fsGroupChangePolicy: "Always"
...
