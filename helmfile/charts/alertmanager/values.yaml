---
alertmanager:
  image: prom/alertmanager
  tag: v0.27.0

  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  # Email configuration using Postfix service
config:
  global:
    resolve_timeout: 5m
    smtp_smarthost: 'postfix.opendesk.svc.cluster.local:25'
    smtp_from: 'alertmanager@opendesk.hrz.uni-marburg.de'
    smtp_require_tls: false

  route:
    group_by: ['alertname', 'namespace']
    group_wait: 10s
    group_interval: 10s
    repeat_interval: 12h
    receiver: 'default-receiver'

    routes:
      # Critical backup failure alerts go to the critical receiver
      - match:
          severity: critical
        receiver: 'backup-critical-receiver'

      # Backup-related warnings go to backup receiver
      - match_re:
          alertname: '.*Backup.*'
        receiver: 'backup-warning-receiver'

  receivers:
    - name: 'default-receiver'
      email_configs:
      - to: 'admin@opendesk.hrz.uni-marburg.de'

    - name: 'backup-critical-receiver'
      email_configs:
      - to: 'admin@opendesk.hrz.uni-marburg.de'

    - name: 'backup-warning-receiver'
      email_configs:
      - to: 'admin@opendesk.hrz.uni-marburg.de'

serviceMonitor:
  enabled: true