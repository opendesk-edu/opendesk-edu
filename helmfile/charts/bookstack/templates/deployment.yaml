apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-bookstack
  labels:
{{ include "bookstack.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.bookstack.replicas }}
  selector:
    matchLabels:
      bookstack/server: "true"
{{ include "bookstack.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        bookstack/server: "true"
{{ include "bookstack.labels" . | nindent 8 }}
    spec:
      containers:
        - name: bookstack
          image: {{ .Values.bookstack.image }}:{{ .Values.bookstack.tag }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 0
            runAsNonRoot: false
            runAsUser: 0
            seLinuxOptions: {}
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: {{ .Values.bookstack.port }}
          env:
            - name: APP_URL
              value: "https://{{ (index .Values.ingress.hosts 0).host }}"
            - name: APP_KEY
              value: {{ .Values.bookstack.appKey | quote }}
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: APP_ENV
              value: "production"
            - name: DB_HOST
              value: {{ include "bookstack.dbHost" . | quote }}
            - name: DB_PORT
              value: {{ include "bookstack.dbPort" . | quote }}
            - name: DB_USER
              value: {{ include "bookstack.dbUser" . | quote }}
            - name: DB_PASS
              value: {{ include "bookstack.dbPassword" . | quote }}
            - name: DB_DATABASE
              value: {{ include "bookstack.dbName" . | quote }}
{{- if .Values.sso.oidc.enabled }}
            - name: AUTH_METHOD
              value: "oidc"
            - name: OIDC_NAME
              value: "Keycloak"
            - name: OIDC_CLIENT_ID
              value: "{{ .Values.sso.oidc.clientId }}"
            - name: OIDC_CLIENT_SECRET
              value: "{{ .Values.sso.oidc.clientSecret }}"
            - name: OIDC_ISSUER_BASE_URL
              value: "{{ .Values.sso.oidc.issuerBaseUrl }}"
{{- end }}
          volumeMounts:
            - name: bookstack-uploads
              mountPath: /config
{{- if .Values.extraVolumeMounts }}
{{- toYaml .Values.extraVolumeMounts | nindent 12 }}
{{- end }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.bookstack.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.bookstack.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources: {{ .Values.bookstack.resources | toYaml | nindent 12 }}
      securityContext:
        sysctls:
          - name: net.ipv4.ip_unprivileged_port_start
            value: "0"
      volumes:
        - name: bookstack-uploads
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-bookstack-uploads
{{- if .Values.extraVolumes }}
{{- toYaml .Values.extraVolumes | nindent 8 }}
{{- end }}
