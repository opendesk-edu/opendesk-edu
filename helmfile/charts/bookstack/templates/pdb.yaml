apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-bookstack-pdb
  labels:
{{ include "bookstack.labels" . | nindent 4 }}
spec:
  minAvailable: {{ if .Values.pdb }}{{ .Values.pdb.minAvailable | default 1 }}{{ else }}1{{ end }}
  selector:
    matchLabels:
      bookstack/server: "true"
{{ include "bookstack.selectorLabels" . | nindent 6 }}
