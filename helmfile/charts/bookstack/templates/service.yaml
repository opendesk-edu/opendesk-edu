apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-bookstack
  labels:
    bookstack/server: "true"
{{ include "bookstack.labels" . | nindent 4 }}
spec:
  selector:
    bookstack/server: "true"
{{ include "bookstack.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: 80
      targetPort: {{ .Values.bookstack.port }}
  type: ClusterIP
