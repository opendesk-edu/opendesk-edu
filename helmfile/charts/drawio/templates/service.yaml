apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-drawio
  labels:
    drawio/server: "true"
{{ include "drawio.labels" . | nindent 4 }}
spec:
  selector:
    drawio/server: "true"
{{ include "drawio.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: 80
      targetPort: {{ .Values.sso.oidc.enabled | ternary 4180 .Values.drawio.port }}
  type: ClusterIP
