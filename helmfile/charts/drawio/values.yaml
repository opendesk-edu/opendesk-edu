drawio:
  image: jgraph/drawio
  tag: latest
  port: 8080

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

sso:
  oidc:
    enabled: false
    proxyImage: quay.io/oauth2-proxy/oauth2-proxy
    proxyTag: v7.6.0
    issuerUrl: "https://id.opendesk.example.com/realms/opendesk"
    clientId: "opendesk-drawio"
    clientSecret: ""
    cookieSecret: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []
