apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-etherpad
  labels:
{{ include "etherpad.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      etherpad/server: "true"
{{ include "etherpad.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        etherpad/server: "true"
{{ include "etherpad.labels" . | nindent 8 }}
    spec:
      containers:
        - name: etherpad
          image: {{ .Values.etherpad.image }}:{{ .Values.etherpad.tag }}
{{- if .Values.sso.oidc.enabled }}
          command:
            - /bin/sh
            - -c
            - |
              cd /opt/etherpad-lite && \
               npm install ep_openid_connect@latest --no-save 2>&1 | tail -5 && \
              echo "OIDC plugin installed, starting etherpad..." && \
              node node_modules/ep_etherpad-lite/node/server.js
{{- end }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          ports:
            - containerPort: {{ .Values.etherpad.port }}
          env:
            - name: DB_HOST
              value: {{ include "etherpad.dbHost" . | quote }}
            - name: DB_PORT
              value: {{ .Values.etherpad.db.port | quote }}
            - name: DB_USER
              value: {{ include "etherpad.dbUser" . | quote }}
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            - name: DB_NAME
              value: {{ include "etherpad.dbName" . | quote }}
            - name: DB_TYPE
              value: "postgres"
            - name: TRUST_PROXY
              value: "true"
{{- if .Values.sso.oidc.enabled }}
            - name: OPENID_CONNECT_CLIENT_ID
              value: {{ .Values.sso.oidc.clientId | quote }}
            - name: OPENID_CONNECT_CLIENT_SECRET
              value: {{ .Values.sso.oidc.clientSecret | quote }}
            - name: OPENID_CONNECT_ISSUER
              value: {{ .Values.sso.oidc.issuerUrl | quote }}
            - name: OPENID_CONNECT_NAME
              value: "SSO"
            - name: OPENID_CONNECT_SCOPE
              value: "openid profile email"
            - name: OPENID_CONNECT_AUTH_METHOD
              value: "none"
            - name: OPENID_CONNECT_REDIRECT_URI
              value: "https://{{ index .Values.ingress.hosts 0 "host" }}/auth/openid_connect/callback"
{{- end }}
          volumeMounts:
            - name: etherpad-data
              mountPath: /opt/etherpad/var
{{- if .Values.extraVolumeMounts }}
{{- toYaml .Values.extraVolumeMounts | nindent 12 }}
{{- end }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.etherpad.port }}
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: {{ .Values.etherpad.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources: {{ .Values.etherpad.resources | toYaml | nindent 12 }}
      volumes:
        - name: etherpad-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-etherpad-data
        - name: etherpad-config
          configMap:
            name: {{ .Release.Name }}-etherpad-config
{{- if .Values.extraVolumes }}
{{- toYaml .Values.extraVolumes | nindent 8 }}
{{- end }}
