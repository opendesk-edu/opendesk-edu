apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-excalidraw
  labels:
    excalidraw/server: "true"
{{ include "excalidraw.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      excalidraw/server: "true"
{{ include "excalidraw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        excalidraw/server: "true"
{{ include "excalidraw.labels" . | nindent 8 }}
    spec:
      containers:
        - name: excalidraw
          image: {{ .Values.excalidraw.image }}:{{ .Values.excalidraw.tag }}
          ports:
            - containerPort: {{ .Values.excalidraw.port }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: nginx-tmp
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          livenessProbe:
            tcpSocket:
              port: {{ .Values.excalidraw.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.excalidraw.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources: {{ .Values.excalidraw.resources | toYaml | nindent 12 }}
      volumes:
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
