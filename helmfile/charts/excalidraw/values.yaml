excalidraw:
  image: excalidraw/excalidraw
  tag: latest
  port: 80

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  oidc:
    enabled: false
    proxyImage: quay.io/oauth2-proxy/oauth2-proxy
    proxyTag: latest
    issuerUrl: "https://keycloak.opendesk.example.com/realms/opendesk"
    clientId: "opendesk-excalidraw"
    clientSecret: ""
    cookieSecret: ""

ingress:
  enabled: true
  className: haproxy
  annotations: {}
  hosts:
    - host: excalidraw.opendesk.hrz.uni-marburg.de
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: excalidraw-tls
      hosts:
        - excalidraw.opendesk.hrz.uni-marburg.de
