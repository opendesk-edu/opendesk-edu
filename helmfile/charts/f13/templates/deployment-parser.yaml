{{- if .Values.services.parser.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "f13.fullname" . }}-parser
  labels:
    {{- include "f13.labels" . | nindent 4 }}
    app.kubernetes.io/component: parser
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "f13.componentLabels" (dict "component" "parser" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "f13.componentLabels" (dict "component" "parser" "root" .) | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gpu.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gpu.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: parser
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.parser.repository }}:{{ .Values.images.parser.tag }}"
          imagePullPolicy: {{ .Values.images.parser.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "f13.fullname" . }}-secrets
                  key: llm-api-key
            - name: LLM_MODEL
              value: {{ .Values.llm.models.parser | quote }}
            - name: LLM_API_URL
              value: {{ .Values.llm.apiUrl | quote }}
            - name: LLM_PROVIDER
              value: {{ .Values.llm.provider | quote }}
            - name: HUGGINGFACE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "f13.fullname" . }}-secrets
                  key: huggingface-token
          volumeMounts:
            - name: docling-models
              mountPath: /app/models
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          {{- if .Values.gpu.resources.limits }}
          resources:
            {{- toYaml .Values.resources.parser | nindent 12 }}
          {{- else }}
          resources:
            {{- toYaml .Values.resources.parser | nindent 12 }}
          {{- end }}
      volumes:
        - name: docling-models
          persistentVolumeClaim:
            claimName: {{ include "f13.fullname" . }}-docling-models
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
