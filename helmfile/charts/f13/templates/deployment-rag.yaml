{{- if .Values.services.rag.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "f13.fullname" . }}-rag
  labels:
    {{- include "f13.labels" . | nindent 4 }}
    app.kubernetes.io/component: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "f13.componentLabels" (dict "component" "rag" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "f13.componentLabels" (dict "component" "rag" "root" .) | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gpu.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gpu.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: rag
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.rag.repository }}:{{ .Values.images.rag.tag }}"
          imagePullPolicy: {{ .Values.images.rag.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: ELASTICSEARCH_HOST
              value: {{ include "f13.elasticHost" . | quote }}
            - name: ELASTICSEARCH_PORT
              value: "9200"
            - name: HUGGINGFACE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "f13.fullname" . }}-secrets
                  key: huggingface-token
          volumeMounts:
            - name: config-rag
              mountPath: /app/configs/rag_pipeline_config.yml
              subPath: rag_pipeline_config.yml
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.rag | nindent 12 }}
      volumes:
        - name: config-rag
          configMap:
            name: {{ include "f13.fullname" . }}-rag
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
