{{- if .Values.services.transcription.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "f13.fullname" . }}-transcription
  labels:
    {{- include "f13.labels" . | nindent 4 }}
    app.kubernetes.io/component: transcription
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "f13.componentLabels" (dict "component" "transcription" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "f13.componentLabels" (dict "component" "transcription" "root" .) | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: transcription
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.transcription.repository }}:{{ .Values.images.transcription.tag }}"
          imagePullPolicy: {{ .Values.images.transcription.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: RABBITMQ_HOST
              value: {{ include "f13.rabbitmqHost" . | quote }}
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: "f13"
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "f13.fullname" . }}-secrets
                  key: rabbitmq-password
            - name: TRANSCRIPTION_DB_HOST
              value: {{ include "f13.transcriptionDbHost" . | quote }}
            - name: TRANSCRIPTION_DB_PORT
              value: "5432"
            - name: TRANSCRIPTION_DB_NAME
              value: {{ .Values.transcription.transcriptionDb.name | quote }}
            - name: TRANSCRIPTION_DB_USER
              value: {{ .Values.transcription.transcriptionDb.user | quote }}
            - name: TRANSCRIPTION_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "f13.fullname" . }}-secrets
                  key: transcription-db-password
            - name: INFERENCE_URL
              value: "http://{{ include "f13.fullname" . }}-transcription-inference:8000"
          volumeMounts:
            - name: config-transcription
              mountPath: /app/configs/transcription.yml
              subPath: transcription.yml
            - name: transcription-data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.transcription | nindent 12 }}
      volumes:
        - name: config-transcription
          configMap:
            name: {{ include "f13.fullname" . }}-transcription
        - name: transcription-data
          persistentVolumeClaim:
            claimName: {{ include "f13.fullname" . }}-transcription-data
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
