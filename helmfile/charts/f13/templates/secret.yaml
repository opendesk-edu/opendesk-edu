apiVersion: v1
kind: Secret
metadata:
  name: {{ include "f13.fullname" . }}-secrets
  labels:
    {{- include "f13.labels" . | nindent 4 }}
type: Opaque
stringData:
  llm-api-key: {{ .Values.secrets.llmApi | default (randAlphaNum 32) | quote }}
  feedback-db-password: {{ .Values.secrets.feedbackDb | default (randAlphaNum 24) | quote }}
  transcription-db-password: {{ .Values.secrets.transcriptionDb | default (randAlphaNum 24) | quote }}
  rabbitmq-password: {{ .Values.secrets.rabbitmq | default (randAlphaNum 24) | quote }}
  huggingface-token: {{ .Values.secrets.huggingfaceToken | default "" | quote }}
