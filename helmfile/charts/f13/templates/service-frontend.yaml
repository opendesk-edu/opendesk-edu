apiVersion: v1
kind: Service
metadata:
  name: {{ include "f13.fullname" . }}-frontend
  labels:
    {{- include "f13.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  selector:
    {{- include "f13.componentLabels" (dict "component" "frontend" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: 9999
      targetPort: http
      protocol: TCP
  type: ClusterIP
