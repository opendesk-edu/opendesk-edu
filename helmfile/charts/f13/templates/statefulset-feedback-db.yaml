apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "f13.fullname" . }}-feedback-db
  labels:
    {{- include "f13.labels" . | nindent 4 }}
    app.kubernetes.io/component: feedback-db
spec:
  serviceName: {{ include "f13.fullname" . }}-feedback-db
  replicas: 1
  selector:
    matchLabels:
      {{- include "f13.componentLabels" (dict "component" "feedback-db" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "f13.componentLabels" (dict "component" "feedback-db" "root" .) | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: docker.io/library/postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            runAsNonRoot: false
          env:
            - name: POSTGRES_DB
              value: f13_feedback
            - name: POSTGRES_USER
              value: f13_feedback
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "f13.fullname" . }}-secrets
                  key: feedback-db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - f13_feedback
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - f13_feedback
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.feedbackDb | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - {{ .Values.persistence.feedbackDb.accessMode }}
        resources:
          requests:
            storage: {{ .Values.persistence.feedbackDb.size }}
