---
# Grafana dashboards for monitoring and logging
opendeskDashingboards:
  backupDashboard:
    enabled: true
    filename: backup-dashboard.json
    
  logExplorerDashboard:
    enabled: true  
    filename: log-explorer.json
    
monitoring:
  enableLokiDatasource: true
  lokiServiceName: "loki.opendesk.svc.cluster.local"
  lokiPort: 3100