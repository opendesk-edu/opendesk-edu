{{- if .Values.grommunio.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.grommunio.serviceAccount.name }}
  labels:
{{ include "grommunio.labels" . | nindent 4 }}
  {{- with .Values.grommunio.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
