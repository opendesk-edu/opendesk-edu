{{- if .Values.hisinone.accountLifecycle.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: hisinone-lifecycle
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: hisinone-lifecycle
    app.kubernetes.io/component: webhook
    app.kubernetes.io/part-of: opendesk
spec:
  selector:
    app.kubernetes.io/name: hisinone-lifecycle
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
{{- end }}
