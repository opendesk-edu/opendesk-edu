suite: test cronjob
templates:
  - cronjob.yaml
tests:
  - it: should create a CronJob with correct kind
    asserts:
      - isKind:
          of: CronJob
  - it: should create CronJob with correct name
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ilias-cronjob
  - it: should configure correct schedule
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.schedule
          value: "0 2 * * *"
  - it: should use correct image and tag
    set:
      cronjob.image: srsolutions/ilias
      cronjob.tag: 9-php8.2-apache
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: srsolutions/ilias:9-php8.2-apache
  - it: should configure correct command
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].command
          value: ["/bin/sh", "-c", "/usr/local/bin/php ${ILIAS_WWW_PATH}/cron/cron.php run-jobs root ${ILIAS_CLIENT_NAME}"]
  - it: should set correct restart policy
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: Never
  - it: should configure environment variables
    asserts:
      - isKind:
          of: CronJob
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: ILIAS_CLIENT_NAME
            value: default
  - it: should have correct security context
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.runAsUser
          value: 33
