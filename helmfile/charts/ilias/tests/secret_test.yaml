suite: test secret
templates:
  - secret.yaml
tests:
  - it: should create a Secret with correct kind
    asserts:
      - isKind:
          of: Secret
  - it: should create Secret with correct name
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ilias-secrets
  - it: should create Secret with correct type
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque
  - it: should generate random root password when not specified
    asserts:
      - isKind:
          of: Secret
      - isNotNull:
          path: stringData["ilias-root-password"]
  - it: should use specified root password when provided
    set:
      ilias.rootPassword: mySecurePassword123
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData["ilias-root-password"]
          value: mySecurePassword123
  - it: should include client.ini.php
    asserts:
      - isNotNull:
          path: stringData["ilias-client.php"]
  - it: should include setup.json
    asserts:
      - isNotNull:
          path: stringData["setup.json"]
