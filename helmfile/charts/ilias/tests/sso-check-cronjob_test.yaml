suite: test sso-check-cronjob
templates:
  - sso-check-cronjob.yaml
tests:
  - it: should always create ConfigMap and CronJob (2 documents)
    asserts:
      - hasDocuments:
          count: 2
  - it: should create ConfigMap with correct name
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sso-check
    documentIndex: 0
  - it: should create CronJob with correct name
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sso-check
    documentIndex: 1
  - it: should configure correct schedule (default)
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.schedule
          value: "*/15 * * * *"
    documentIndex: 1
  - it: should suspend CronJob when ssoCheck.enabled is false
    set:
      ssoCheck.enabled: false
    documentIndex: 1
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.suspend
          value: true
  - it: should not suspend CronJob when enabled
    set:
      ssoCheck.enabled: true
    documentIndex: 1
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.suspend
          value: false
  - it: should use custom schedule when specified
    set:
      ssoCheck.schedule: "0 * * * *"
    documentIndex: 1
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.schedule
          value: "0 * * * *"
