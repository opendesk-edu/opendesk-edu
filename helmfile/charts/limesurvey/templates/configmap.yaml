apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-limesurvey-config
data:
  config.php: |-
    <?php
    return [
        'components' => [
            'db' => [
                'connectionString' => 'mysql:host={{ include "limesurvey.dbHost" . }};port={{ include "limesurvey.dbPort" . }};dbname={{ include "limesurvey.dbName" . }}',
                'username' => '{{ include "limesurvey.dbUser" . }}',
                'password' => '{{ include "limesurvey.dbPassword" . }}',
                'tablePrefix' => '{{ .Values.limesurvey.tablePrefix }}',
            ],
            'request' => [
                'baseUrl' => 'https://{{ (index .Values.ingress.hosts 0).host }}',
            ],
            'urlManager' => [
                'urlFormat' => 'path',
                'showScriptName' => false,
            ],
        ],
        'config' => [
            'sitename' => '{{ .Values.limesurvey.siteName }}',
            'timeadjust' => '{{ .Values.limesurvey.timezone }}',
        ],
    ];
  setup.sh: |-
    #!/bin/bash
    set -e

    echo "Waiting for database..."
    tries=0
    maxTries=30
    until (echo > /dev/tcp/${LS_DB_HOST}/${LS_DB_PORT}) 2>/dev/null; do
        tries=$((tries + 1))
        if [ $tries -gt $maxTries ]; then
            echo "Could not connect to database, aborting"
            exit 1
        fi
        echo "Cannot connect to database, waiting (attempt $tries/$maxTries)"
        sleep 5
    done
    echo "Database connection established"

    echo "LimeSurvey ready for first-time configuration via web UI"
