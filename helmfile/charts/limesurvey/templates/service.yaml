apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-limesurvey
  labels:
    limesurvey/server: "true"
{{ include "limesurvey.labels" . | nindent 4 }}
spec:
  selector:
    limesurvey/server: "true"
{{ include "limesurvey.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: 80
      name: {{ .Values.limesurvey.oidc.enabled | ternary "oauth2-proxy" "limesurvey" }}
      targetPort: {{ .Values.limesurvey.oidc.enabled | ternary 4180 .Values.limesurvey.port }}
  type: ClusterIP
