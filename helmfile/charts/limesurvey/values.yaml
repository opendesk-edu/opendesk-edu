limesurvey:
  image: martialblog/limesurvey
  tag: latest
  port: 80
  db:
    host: ""
    port: 3306
    user: limesurvey
    password: ""
    name: limesurvey
  tablePrefix: "lime_"
  siteName: "LimeSurvey"
  adminName: "admin"
  adminEmail: "admin@opendesk.example.com"
  timezone: Europe/Berlin
  volumes:
    upload:
      size: 1Gi
      accessMode: ReadWriteMany
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  oidc:
    enabled: false
    proxyImage: quay.io/oauth2-proxy/oauth2-proxy
    proxyTag: latest
    issuerUrl: "https://keycloak.opendesk.example.com/realms/opendesk"
    clientId: "opendesk-limesurvey"
    clientSecret: ""
    cookieSecret: ""

extraVolumes: []
extraVolumeMounts: []

ingress:
  enabled: true
  annotations: {}
  hosts:
    - host: limesurvey.opendesk.hrz.uni-marburg.de
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: limesurvey-tls
      hosts:
        - limesurvey.opendesk.hrz.uni-marburg.de

mariadb:
  enabled: true
  auth:
    username: limesurvey
    password: ""
    rootPassword: ""
    database: limesurvey
  primary:
    persistence:
      enabled: true
      size: 5Gi

sso:
  oidc:
    enabled: false

