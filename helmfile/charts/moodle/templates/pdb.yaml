apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "moodle.fullname" . }}-pdb
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
spec:
  minAvailable: {{ if .Values.pdb }}{{ .Values.pdb.minAvailable | default 1 }}{{ else }}1{{ end }}
  selector:
    matchLabels:
      {{- include "moodle.selectorLabels" . | nindent 6 }}
