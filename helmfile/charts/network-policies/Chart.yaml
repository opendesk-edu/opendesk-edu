apiVersion: v2
name: network-policies
description: |-
  Kubernetes Network Policies for openDesk HRZ deployment.
  Controls ingress and egress traffic between services to implement
  defense-in-depth security posture.

  Policies follow principle of least privilege:
  - Deny all by default
  - Allow only required service-to-service communications
  - Allow DNS resolution (CoreDNS access)
  - Allow ingress traffic to public endpoints via Ingress Controller

type: application
version: 1.0.0
appVersion: "1.0.0"
maintainers:
  - name: HRZ openDesk Team
    email: admin@opendesk.hrz.uni-marburg.de
keywords:
  - network-policies
  - security
  - networking
  - defense-in-depth
home: https://opendesk.hrz.uni-marburg.de
sources:
  - https://gitlab.hrz.uni-marburg.de/hrz/kubernetes/opendesk/opendesk
