{{- if .Values.ingressControllerPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ingress-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: network-policies
    app.kubernetes.io/component: ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: "app"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
          podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  {{- range .Values.ingressControllerPolicy.ingressClassNames }}
                  - {{ . }}
                  {{- end }}
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
{{- end }}
