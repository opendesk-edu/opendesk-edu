{{- if .Values.serviceToServicePolicies.enabled }}
{{- range .Values.serviceToServicePolicies.rules }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-{{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: network-policies
    app.kubernetes.io/component: service-to-service
spec:
  podSelector:
    matchLabels:
      {{- toYaml .podSelector | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        {{- toYaml .to | nindent 8 }}
      ports:
        {{- range .ports }}
        - protocol: {{ .protocol }}
          port: {{ .port }}
        {{- end }}
---
{{- end }}
{{- end }}
