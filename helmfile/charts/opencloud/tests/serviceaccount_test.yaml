suite: test serviceaccount
templates:
  - serviceaccount.yaml
tests:
  - it: should create ServiceAccount with correct name
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-opencloud
      - equal:
          path: automountServiceAccountToken
          value: false
  - it: should not create ServiceAccount when create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should include custom annotations when provided
    set:
      serviceAccount.create: true
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/s3-access"
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/s3-access"
  - it: should use default annotations when none provided
    set:
      serviceAccount.create: true
    asserts:
      - notExists:
          path: metadata.annotations
