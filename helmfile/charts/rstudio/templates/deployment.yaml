apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rstudio.fullname" . }}
  labels:
    {{- include "rstudio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rstudio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rstudio.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: rstudio
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8787
              protocol: TCP
              name: http
          env:
            - name: DISABLE_AUTH
              value: "true"
          volumeMounts:
            - name: workspace
              mountPath: /home/rstudio
            {{- if .Values.opencloud.enabled }}
            - name: opencloud
              mountPath: /home/rstudio/{{ .Values.opencloud.mountPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.opencloud.enabled }}
        - name: opencloud-sync
          image: rclone/rclone:latest
          command:
            - sh
            - -c
            - |
              rclone config create opencloud webdav \
                url "{{ .Values.opencloud.url }}/dav/files/{{ .Values.opencloud.username }}" \
                vendor "other" \
                user "{{ .Values.opencloud.username }}" \
                pass "{{ .Values.opencloud.password }}"
              while true; do
                echo "Syncing OpenCloud..."
                rclone sync opencloud:{{ .Values.opencloud.remotePath }} /data/ \
                  --verbose --progress
                sleep {{ .Values.opencloud.syncInterval }}
              done
          volumeMounts:
            - name: opencloud
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
        {{- end }}
      volumes:
        - name: workspace
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "rstudio.fullname" . }}-workspace
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.opencloud.enabled }}
        - name: opencloud
          emptyDir: {}
        {{- end }}
