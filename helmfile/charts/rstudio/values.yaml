---
replicaCount: 1
image:
  repository: rocker/rstudio
  tag: "4.4.2"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8787
ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: haproxy
  hosts:
    - host: r.opendesk.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
persistence:
  enabled: true
  size: 10Gi
  accessMode: ReadWriteOnce
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 4Gi
nodeSelector: {}
tolerations: []
affinity: {}

# OpenCloud storage integration via rclone sidecar
opencloud:
  enabled: false
  url: "https://opencloud.opendesk.example.com"
  username: ""
  password: ""
  syncInterval: "60s"
  # Sub-path within OpenCloud to mount (e.g. "projects" or "/" for root)
  remotePath: "/"
  # Local mount point (relative to the main container's workspace)
  mountPath: "opencloud"
