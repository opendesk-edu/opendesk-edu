apiVersion: v1
kind: Service
metadata:
  name: {{ include "seaweedfs.masterFullname" . }}
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
    app.kubernetes.io/component: master
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9333
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 19333
      targetPort: grpc
      protocol: TCP
  selector:
    {{- include "seaweedfs.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: master
