apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-self-service-password
  labels:
    self-service-password/server: "true"
{{ include "self-service-password.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      self-service-password/server: "true"
{{ include "self-service-password.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        self-service-password/server: "true"
{{ include "self-service-password.labels" . | nindent 8 }}
{{- if .Values.selfServicePassword.oidc.enabled }}
      annotations:
        sidecar.istio.io/inject: "false"
{{- end }}
    spec:
      containers:
        - name: self-service-password
          image: {{ .Values.selfServicePassword.image }}:{{ .Values.selfServicePassword.tag }}
          ports:
            - containerPort: {{ .Values.selfServicePassword.port }}
          securityContext:
            runAsUser: 33
            runAsGroup: 33
            runAsNonRoot: true
          env:
            - name: LDAP_HOST
              value: {{ .Values.selfServicePassword.ldap.host | quote }}
            - name: LDAP_PORT
              value: {{ .Values.selfServicePassword.ldap.port | quote }}
            - name: LDAP_BASE_DN
              value: {{ .Values.selfServicePassword.ldap.baseDn | quote }}
            - name: LDAP_BIND_DN
              value: {{ .Values.selfServicePassword.ldap.bindDn | quote }}
            - name: LDAP_STARTTLS
              value: {{ .Values.selfServicePassword.ldap.startTls | quote }}
            - name: LDAP_NETWORK_TIMEOUT
              value: {{ .Values.selfServicePassword.ldap.networkTimeout | quote }}
          resources: {{ .Values.selfServicePassword.resources | toYaml | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.selfServicePassword.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.selfServicePassword.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
{{- if .Values.selfServicePassword.oidc.enabled }}
        - name: oauth2-proxy
          image: {{ .Values.selfServicePassword.oidc.proxyImage }}:{{ .Values.selfServicePassword.oidc.proxyTag }}
          ports:
            - containerPort: 4180
              protocol: TCP
          args:
            - --provider=oidc
            - --oidc-issuer-url={{ .Values.selfServicePassword.oidc.issuerUrl }}
            - --upstream=http://127.0.0.1:{{ .Values.selfServicePassword.port }}
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --client-id={{ .Values.selfServicePassword.oidc.clientId }}
            - --client-secret={{ .Values.selfServicePassword.oidc.clientSecret }}
            - --cookie-secret={{ .Values.selfServicePassword.oidc.cookieSecret }}
            - --cookie-secure=true
            - --pass-authorization-header=true
            - --set-xauthrequest=true
            - --ssl-insecure-skip-verify=true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
{{- end }}
