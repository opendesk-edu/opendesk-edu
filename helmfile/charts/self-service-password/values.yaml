selfServicePassword:
  image: ltbproject/self-service-password
  tag: latest
  port: 80

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  ldap:
    host: ""
    port: "389"
    baseDn: ""
    bindDn: ""
    startTls: "false"
    networkTimeout: "2"

  oidc:
    enabled: false
    proxyImage: quay.io/oauth2-proxy/oauth2-proxy
    proxyTag: latest
    issuerUrl: "https://keycloak.opendesk.example.com/realms/opendesk"
    clientId: "opendesk-ssp"
    clientSecret: ""
    cookieSecret: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []
