apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "slidev.name" . }}-test-connection"
  labels:
    {{- include "slidev.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: registry.hrz.uni-marburg.de/dockerio-cache/busybox:latest
      command: ['nc', '-z', '-w', '3', '{{ include "slidev.name" . }}', '{{ .Values.service.port | toString }}']
  restartPolicy: Never
