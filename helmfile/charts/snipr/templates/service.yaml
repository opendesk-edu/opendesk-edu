apiVersion: v1
kind: Service
metadata:
  name: {{ include "snipr.fullname" . }}
  labels:
    {{- include "snipr.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "snipr.selectorLabels" . | nindent 4 }}
