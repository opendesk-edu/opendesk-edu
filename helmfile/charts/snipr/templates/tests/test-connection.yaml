apiVersion: v1
kind: Pod
metadata:
  name: {{ include "snipr.fullname" . }}-test-connection
  labels:
    {{- include "snipr.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "snipr.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
