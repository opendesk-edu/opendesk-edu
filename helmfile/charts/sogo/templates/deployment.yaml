apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sogo
  labels:
{{ include "sogo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      sogo/server: "true"
{{ include "sogo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        sogo/server: "true"
{{ include "sogo.labels" . | nindent 8 }}
    spec:
      {{- if .Values.sogo.db.initSchema }}
      initContainers:
        - name: init-db-schema
          image: "docker.io/bitnami/postgresql:17"
          imagePullPolicy: {{ .Values.sogo.image.pullPolicy }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "sogo.fullname" . }}
                  key: db-password
          command:
            - sh
            - -c
            - |
              echo "Granting schema permissions to sogo user..."
              psql -U {{ .Values.sogo.db.user }} -d {{ .Values.sogo.db.name }} -h {{ .Values.sogo.db.host }} -p {{ .Values.sogo.db.port }} -c "GRANT ALL ON SCHEMA public TO {{ .Values.sogo.db.user }};" 2>&1
              echo "Schema init complete."
      {{- end }}
      containers:
        - name: sogo
          image: {{ .Values.sogo.image.repository }}:{{ .Values.sogo.image.tag }}
          imagePullPolicy: {{ .Values.sogo.image.pullPolicy }}
          ports:
            - containerPort: 80
          command:
            - "/bin/bash"
            - "/opt/custom-entrypoint/entrypoint.sh"
          env:
            - name: SOGO_DEFAULT_ENCODING
              value: "UTF-8"
          envFrom:
            - configMapRef:
                name: {{ include "sogo.fullname" . }}
            - secretRef:
                name: {{ include "sogo.fullname" . }}
          volumeMounts:
            - name: sogo-data
              mountPath: /var/lib/sogo
            - name: sogo-config
              mountPath: /etc/sogo/sogo.conf.d
            - name: sogo-main-config
              mountPath: /etc/sogo/sogo.conf
              subPath: sogo.conf
            - name: custom-entrypoint
              mountPath: /opt/custom-entrypoint
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          resources: {{ .Values.sogo.resources | toYaml | nindent 12 }}
      volumes:
        - name: sogo-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-sogo-data
        - name: sogo-config
          configMap:
            name: {{ include "sogo.fullname" . }}
        - name: sogo-main-config
          configMap:
            name: {{ include "sogo.fullname" . }}-main-config
        {{- if .Values.sogo.oidc.enabled }}
        - name: custom-entrypoint
          configMap:
            name: {{ include "sogo.fullname" . }}-entrypoint
        {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
