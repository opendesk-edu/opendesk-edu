apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sogo.fullname" . }}-entrypoint
  labels:
    {{- include "sogo.labels" . | nindent 4 }}
data:
  supervisord.conf: |
    [unix_http_server]
    file=/var/run/supervisor.sock
    chmod=0700

    [supervisord]
    nodaemon=true
    logfile=/var/log/supervisord.log
    pidfile=/var/run/supervisord.pid
    childlogdir=/var/log/supervisor

    ; the below section must remain in the config file for RPC
    ; (supervisorctl/web interface) to work.
    [rpcinterface:supervisor]
    supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

    [supervisorctl]
    serverurl=unix:///var/run/supervisor.sock

    ; SOGo
    [program:sogo]
    user=sogo
    command=/usr/sbin/sogod -WOWorkersCount 5 -WONoDetach YES
    autostart=true
    autorestart=true
    stopasgroup=true
    killasgroup=true
    stopwaitsecs=90
    directory=/var/lib/sogo
    stdout_logfile=/dev/stdout
    stdout_logfile_maxbytes=0
    stderr_logfile=/dev/stderr
    stderr_logfile_maxbytes=0
    environment=HOME="/var/lib/sogo"

    ; Apache
    [program:apache]
    user=www-data
    command=/usr/sbin/apache2 -D FOREGROUND
    autostart=true
    autorestart=true
    stopasgroup=true
    killasgroup=true
    stdout_logfile=/dev/stdout
    stdout_logfile_maxbytes=0
    stderr_logfile=/dev/stderr
    stderr_logfile_maxbytes=0

    ; SOGo Tool Plus - DISABLED - SOGo auto-initializes databases on first connection
    ; Manual update command is not needed and interferes with SOGo normal operation

  entrypoint.sh: |
    #!/bin/bash
    set -ex
    echo "Starting SOGo setup..."

    # Install sogo and runtime deps on first run
    if ! command -v sogod &>/dev/null; then
      echo "Installing SOGo from Debian repos..."
      # Configure apt proxy and force IPv4
      # Proxy is optional — defaults to direct internet access if not configured
      {{- if .Values.sogo.aptProxy }}
      echo 'Acquire::http::Proxy "{{ .Values.sogo.aptProxy }}";' > /etc/apt/apt.conf.d/99proxy
      echo 'Acquire::https::Proxy "{{ .Values.sogo.aptProxy }}";' >> /etc/apt/apt.conf.d/99proxy
      {{- end }}
      echo 'Acquire::ForceIPv4 "true";' >> /etc/apt/apt.conf.d/99proxy
      apt-get update -qq
      apt-get install -y -qq --no-install-recommends \
        supervisor \
        apache2 \
        libapache2-mod-proxy-uwsgi \
        sogo \
        sogo-shell \
        ca-certificates
      a2enmod proxy proxy_uwsgi proxy_http headers rewrite
      rm -rf /var/lib/apt/lists/*
    fi

    # Create mandatory dirs
    for dir in lib log run spool; do
      mkdir -p /var/$dir/sogo
      chown -R sogo:sogo /var/$dir/sogo
      chmod 755 /var/$dir/sogo
    done

    # Create Apache runtime directory
    mkdir -p /var/run/apache2 /var/lock/apache2 /var/log/apache2
    chown -R www-data:www-data /var/run/apache2 /var/lock/apache2 /var/log/apache2

    mkdir -p /etc/apache2/sites-enabled /etc/apache2/sites-available

    # Write Apache SOGo vhost config
    echo '<VirtualHost *:80>' > /etc/apache2/sites-available/sogo.conf
    echo '    ServerAdmin admin@localhost' >> /etc/apache2/sites-available/sogo.conf
    echo '    DocumentRoot /usr/share/sogo-web' >> /etc/apache2/sites-available/sogo.conf
    echo '    ServerName sogo' >> /etc/apache2/sites-available/sogo.conf
    echo '' >> /etc/apache2/sites-available/sogo.conf
    echo '    ProxyPreserveHost On' >> /etc/apache2/sites-available/sogo.conf
    echo '    RequestHeader set "x-webobjects-server-port" "80"' >> /etc/apache2/sites-available/sogo.conf
    echo '    RequestHeader set "x-webobjects-server-name" "sogo"' >> /etc/apache2/sites-available/sogo.conf
    echo '    RequestHeader set "x-webobjects-server-url" "http://sogo"' >> /etc/apache2/sites-available/sogo.conf
    echo '' >> /etc/apache2/sites-available/sogo.conf
    echo '    <Location /SOGo>' >> /etc/apache2/sites-available/sogo.conf
    echo '        RequestHeader set "x-webobjects-server-port" "80"' >> /etc/apache2/sites-available/sogo.conf
    echo '        RequestHeader set "x-webobjects-server-name" "sogo"' >> /etc/apache2/sites-available/sogo.conf
    echo '        RequestHeader set "x-webobjects-server-url" "http://sogo"' >> /etc/apache2/sites-available/sogo.conf
    echo '        ProxyPass uwsgi://127.0.0.1:20000/ retry=0' >> /etc/apache2/sites-available/sogo.conf
    echo '        ProxyPassReverse uwsgi://127.0.0.1:20000/' >> /etc/apache2/sites-available/sogo.conf
    echo '    </Location>' >> /etc/apache2/sites-available/sogo.conf
    echo '' >> /etc/apache2/sites-available/sogo.conf
    echo '    <Location /SOGo.woa>' >> /etc/apache2/sites-available/sogo.conf
    echo '        ProxyPass uwsgi://127.0.0.1:20000/SOGo.woa retry=0' >> /etc/apache2/sites-available/sogo.conf
    echo '        ProxyPassReverse uwsgi://127.0.0.1:20000/SOGo.woa' >> /etc/apache2/sites-available/sogo.conf
    echo '    </Location>' >> /etc/apache2/sites-available/sogo.conf
    echo '' >> /etc/apache2/sites-available/sogo.conf
    echo '    ErrorLog /var/log/apache2/sogo-error.log' >> /etc/apache2/sites-available/sogo.conf
    echo '    CustomLog /var/log/apache2/sogo-access.log combined' >> /etc/apache2/sites-available/sogo.conf
    echo '</VirtualHost>' >> /etc/apache2/sites-available/sogo.conf
    ln -sf /etc/apache2/sites-available/sogo.conf /etc/apache2/sites-enabled/000-sogo.conf
    chmod 644 /etc/apache2/sites-available/sogo.conf
    # Ensure Apache listens on IPv4 (default Listen 80 only binds IPv6 on some systems)
    echo 'Listen 0.0.0.0:80' > /etc/apache2/ports.conf
    echo 'Listen 443' >> /etc/apache2/ports.conf

    # Export Apache environment variables (Apache config parser reads from shell env)
    export APACHE_RUN_USER="www-data"
    export APACHE_RUN_GROUP="www-data"
    export APACHE_RUN_DIR="/var/run/apache2"
    export APACHE_PID_FILE="/var/run/apache2/apache2.pid"
    export APACHE_LOCK_DIR="/var/lock/apache2"
    export APACHE_LOG_DIR="/var/log/apache2"

    # Substitute OIDC client secret in sogo.conf and write to config dir
    if [ -f /opt/sogo-config-template/sogo.conf ]; then
      sed "s/__SOGO_OIDC_CLIENT_SECRET__/${SOGO_OPENID_CLIENT_SECRET}/g" \
        /opt/sogo-config-template/sogo.conf > /etc/sogo/sogo.conf
      chown sogo:sogo /etc/sogo/sogo.conf
      chmod 644 /etc/sogo/sogo.conf
    fi

    echo "Starting supervisord..."
    exec /usr/bin/supervisord -c /opt/custom-entrypoint/supervisord.conf