apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sogo.fullname" . }}-entrypoint
  labels:
    {{- include "sogo.labels" . | nindent 4 }}
data:
  entrypoint.sh: |
    #!/bin/bash
    set -ex
    echo "Starting SOGo setup..."

    # Install sogo and runtime deps on first run (for Debian package setups)
    # Skip if custom-built image already has SOGo
    if ! command -v sogod &>/dev/null; then
      echo "Installing SOGo from Debian repos..."
      echo 'Acquire::http::Proxy "http://www-proxy2.uni-marburg.de:3128";' > /etc/apt/apt.conf.d/99proxy
      echo 'Acquire::https::Proxy "http://www-proxy2.uni-marburg.de:3128";' >> /etc/apt/apt.conf.d/99proxy
      echo 'Acquire::ForceIPv4 "true";' >> /etc/apt/apt.conf.d/99proxy
      apt-get update -qq
      apt-get install -y -qq --no-install-recommends \
        supervisor \
        apache2 \
        sogo \
        sogo-shell \
        ca-certificates
      a2enmod proxy proxy_http headers rewrite
      # Add static web resources Alias
      echo 'Alias /SOGo/WebServerResources/ /usr/lib/GNUstep/SOGo/WebServerResources/' >> /etc/apache2/conf-available/sogo-web-resources.conf
      echo '<Directory /usr/lib/GNUstep/SOGo/>' >> /etc/apache2/conf-available/sogo-web-resources.conf
      echo '  Require all granted' >> /etc/apache2/conf-available/sogo-web-resources.conf
      echo '</Directory>' >> /etc/apache2/conf-available/sogo-web-resources.conf
      a2enconf sogo-web-resources
      rm -rf /var/lib/apt/lists/*
    fi

    # Create mandatory dirs
    for dir in lib log run spool; do
      mkdir -p /var/$dir/sogo
      chown -R sogo:sogo /var/$dir/sogo
      chmod 755 /var/$dir/sogo
    done

    # Create Apache runtime directory
    mkdir -p /var/run/apache2 /var/lock/apache2 /var/log/apache2
    chown -R www-data:www-data /var/run/apache2 /var/lock/apache2 /var/log/apache2

    mkdir -p /etc/apache2/sites-enabled /etc/apache2/sites-available

    # Write Apache SOGo vhost config
    echo '<VirtualHost *:80>' > /etc/apache2/sites-available/sogo.conf
    echo '    ServerAdmin admin@localhost' >> /etc/apache2/sites-available/sogo.conf
    echo '    DocumentRoot /usr/share/sogo-web' >> /etc/apache2/sites-available/sogo.conf
    echo '    ServerName sogo' >> /etc/apache2/sites-available/sogo.conf
    echo '    ServerAlias *' >> /etc/apache2/sites-available/sogo.conf
    echo '    RedirectMatch 302 ^/$ {{ .Values.sogo.serverURL | default "https://sogo.opendesk.hrz.uni-marburg.de" }}/SOGo/' >> /etc/apache2/sites-available/sogo.conf
    echo '' >> /etc/apache2/sites-available/sogo.conf
    echo '    ProxyPreserveHost On' >> /etc/apache2/sites-available/sogo.conf
    echo '    RequestHeader set "x-webobjects-server-port" "443"' >> /etc/apache2/sites-available/sogo.conf
    echo '    RequestHeader set "x-webobjects-server-name" "{{ .Values.sogo.host | default "sogo.opendesk.hrz.uni-marburg.de" }}"' >> /etc/apache2/sites-available/sogo.conf
    echo '    RequestHeader set "x-webobjects-server-url" "{{ .Values.sogo.serverURL | default "https://sogo.opendesk.hrz.uni-marburg.de" }}"' >> /etc/apache2/sites-available/sogo.conf
    echo '' >> /etc/apache2/sites-available/sogo.conf
    echo '    <Location /SOGo>' >> /etc/apache2/sites-available/sogo.conf
    echo '        RequestHeader set "x-webobjects-server-port" "443"' >> /etc/apache2/sites-available/sogo.conf
    echo '        RequestHeader set "x-webobjects-server-name" "{{ .Values.sogo.host | default "sogo.opendesk.hrz.uni-marburg.de" }}"' >> /etc/apache2/sites-available/sogo.conf
    echo '        RequestHeader set "x-webobjects-server-url" "{{ .Values.sogo.serverURL | default "https://sogo.opendesk.hrz.uni-marburg.de" }}"' >> /etc/apache2/sites-available/sogo.conf
    echo '        ProxyPass http://127.0.0.1:20000/SOGo retry=0' >> /etc/apache2/sites-available/sogo.conf
    echo '        ProxyPassReverse http://127.0.0.1:20000/SOGo' >> /etc/apache2/sites-available/sogo.conf
    echo '    </Location>' >> /etc/apache2/sites-available/sogo.conf
    echo '' >> /etc/apache2/sites-available/sogo.conf
    echo '    ErrorLog /var/log/apache2/sogo-error.log' >> /etc/apache2/sites-available/sogo.conf
    echo '    CustomLog /var/log/apache2/sogo-access.log combined' >> /etc/apache2/sites-available/sogo.conf
    echo '</VirtualHost>' >> /etc/apache2/sites-available/sogo.conf
    ln -sf /etc/apache2/sites-available/sogo.conf /etc/apache2/sites-enabled/000-sogo.conf
    chmod 644 /etc/apache2/sites-available/sogo.conf
    echo 'Listen 0.0.0.0:80' > /etc/apache2/ports.conf
    echo 'Listen 443' >> /etc/apache2/ports.conf

    # Export Apache environment variables
    export APACHE_RUN_USER="www-data"
    export APACHE_RUN_GROUP="www-data"
    export APACHE_RUN_DIR="/var/run/apache2"
    export APACHE_PID_FILE="/var/run/apache2/apache2.pid"
    export APACHE_LOCK_DIR="/var/lock/apache2"
    export APACHE_LOG_DIR="/var/log/apache2"

    # Inject OIDC client secret from environment variable into sogo.conf
    # This allows the secret to be set via Kubernetes secret (kubectl patch or sync job)
    # without requiring a Helm re-render / ConfigMap update.
    if [ -n "$SOGO_OPENID_CLIENT_SECRET" ]; then
      echo "Injecting OIDC client secret from SOGO_OPENID_CLIENT_SECRET env var..."
      sed "s|__SOGO_OIDC_CLIENT_SECRET__|${SOGO_OPENID_CLIENT_SECRET}|g" /opt/sogo-config-template/sogo.conf > /etc/sogo/sogo.conf
    else
      echo "WARNING: SOGO_OPENID_CLIENT_SECRET not set, using placeholder from config template"
      cp /opt/sogo-config-template/sogo.conf /etc/sogo/sogo.conf
    fi

    echo "Starting supervisord..."
    exec /usr/bin/supervisord -c /opt/custom-entrypoint/supervisord.conf

  supervisord.conf: |
    [unix_http_server]
    file=/var/run/supervisor.sock
    chmod=0700

    [supervisord]
    nodaemon=true
    logfile=/var/log/supervisord.log
    pidfile=/var/run/supervisord.pid
    childlogdir=/var/log/supervisor

    [rpcinterface:supervisor]
    supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

    [supervisorctl]
    serverurl=unix:///var/run/supervisor.sock

    ; SOGo
    [program:sogo]
    user=sogo
    command=/usr/sbin/sogod -WOWorkersCount {{ .Values.sogo.workers | default 5 }} -WONoDetach YES
    autostart=true
    autorestart=true
    stopasgroup=true
    killasgroup=true
    stopwaitsecs=90
    directory=/var/lib/sogo
    stdout_logfile=/dev/stdout
    stdout_logfile_maxbytes=0
    stderr_logfile=/dev/stderr
    stderr_logfile_maxbytes=0
    environment=HOME="/var/lib/sogo"

    ; Apache
    [program:apache]
    user=www-data
    command=/usr/sbin/apache2 -D FOREGROUND
    autostart=true
    autorestart=true
    stopasgroup=true
    killasgroup=true
    stdout_logfile=/dev/stdout
    stdout_logfile_maxbytes=0
    stderr_logfile=/dev/stderr
    stderr_logfile_maxbytes=0

    ; SOGo Tool Plus - DISABLED - SOGo auto-initializes databases on first connection
    ; Manual update command is not needed and interferes with SOGo normal operation
