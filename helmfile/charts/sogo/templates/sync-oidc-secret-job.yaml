{{- if .Values.sogo.oidc.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "sogo.fullname" . }}-sync-oidc-secret
  labels:
    {{- include "sogo.labels" . | nindent 4 }}
    app.kubernetes.io/component: oidc-secret-sync
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "-5"
spec:
  template:
    metadata:
      labels:
        {{- include "sogo.labels" . | nindent 8 }}
        app.kubernetes.io/component: oidc-secret-sync
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "sogo.fullname" . }}
      containers:
      - name: sync-secret
        image: docker.io/bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: KEYCLOAK_ADMIN_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.global.keycloak.secretName | default "ums-keycloak" }}
              key: admin-password
        - name: KEYCLOAK_POD
          value: "{{ .Values.global.keycloak.podName | default "ums-keycloak-0" }}"
        - name: KEYCLOAK_REALM
          value: "{{ .Values.global.keycloak.realm | default "opendesk" }}"
        - name: SOGO_SECRET_NAME
          value: "{{ include "sogo.fullname" . }}"
        - name: SOGO_CLIENT_ID
          value: "{{ .Values.sogo.oidc.clientId | default "sogo" }}"
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          KEYCLOAK_ADMIN_SECRET=$(echo "$KEYCLOAK_ADMIN_SECRET" | base64 -d)
          
          echo "Retrieving sogo client secret from Keycloak..."
          
          CLIENT_SECRET=$(kubectl exec "$KEYCLOAK_POD" -n {{ .Release.Namespace }} -- /opt/keycloak/bin/kcadm.sh \
            config credentials --server http://localhost:8080/ --realm master --user "${KEYCLOAK_ADMIN_USER:-kcadmin}" --password "$KEYCLOAK_ADMIN_SECRET" && \
            kubectl exec "$KEYCLOAK_POD" -n {{ .Release.Namespace }} -- /opt/keycloak/bin/kcadm.sh \
            get clients -r "$KEYCLOAK_REALM" -q clientId="$SOGO_CLIENT_ID" --fields=secret | tail -1)
          
          if [ -z "$CLIENT_SECRET" ]; then
            echo "Failed to retrieve client secret from Keycloak"
            exit 1
          fi
          
          echo "Found client secret in Keycloak: ${CLIENT_SECRET:0:20}***"
          
          ENCODED_SECRET=$(echo -n "$CLIENT_SECRET" | base64)
          
          kubectl patch secret "$SOGO_SECRET_NAME" -n {{ .Release.Namespace }} \
            -p "{\"data\":{\"oidc-client-secret\":\"$ENCODED_SECRET\"}}"
          
          echo "Successfully synchronized OIDC client secret from Keycloak to Kubernetes"
{{- end }}