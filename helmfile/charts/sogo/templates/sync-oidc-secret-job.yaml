{{- if .Values.sogo.oidc.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sogo.fullname" . }}-keycloak-hook
  labels:
    {{- include "sogo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sogo.fullname" . }}-keycloak-hook
  labels:
    {{- include "sogo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "patch", "create"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sogo.fullname" . }}-keycloak-hook
  labels:
    {{- include "sogo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sogo.fullname" . }}-keycloak-hook
subjects:
- kind: ServiceAccount
  name: {{ include "sogo.fullname" . }}-keycloak-hook
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "sogo.fullname" . }}-keycloak-hook
  labels:
    {{- include "sogo.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-hook
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "0"
spec:
  template:
    metadata:
      labels:
        {{- include "sogo.labels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak-hook
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "sogo.fullname" . }}-keycloak-hook
      containers:
      - name: keycloak-setup
        image: docker.io/bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: KEYCLOAK_ADMIN_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.global.keycloak.secretName | default "ums-keycloak" }}
              key: admin-password
        - name: KEYCLOAK_POD
          value: "{{ .Values.global.keycloak.podName | default "ums-keycloak-0" }}"
        - name: KEYCLOAK_REALM
          value: "{{ .Values.global.keycloak.realm | default "opendesk" }}"
        - name: SOGO_CLIENT_ID
          value: "{{ .Values.sogo.oidc.clientId | default "sogo" }}"
        - name: SOGO_OIDC_SECRET_NAME
          value: "{{ include "sogo.fullname" . }}-oidc"
        command:
        - /bin/sh
        - -c
        - |
          set -e

          KEYCLOAK_ADMIN_SECRET=$(echo "$KEYCLOAK_ADMIN_SECRET" | base64 -d)
          CLIENT_SECRET=$(openssl rand -hex 32)

          echo "Authenticating to Keycloak..."
          kubectl exec "$KEYCLOAK_POD" -n {{ .Release.Namespace }} -- /opt/keycloak/bin/kcadm.sh \
            config credentials --server http://localhost:8080/ --realm master \
            --user "${KEYCLOAK_ADMIN_USER:-kcadmin}" --password "$KEYCLOAK_ADMIN_SECRET"

          CLIENT_UUID=$(kubectl exec "$KEYCLOAK_POD" -n {{ .Release.Namespace }} -- \
            /opt/keycloak/bin/kcadm.sh get clients -r "$KEYCLOAK_REALM" \
            -q clientId="$SOGO_CLIENT_ID" --fields=id 2>/dev/null | tail -1 | grep -o '"id":"[^"]*"' | cut -d'"' -f4 || true)

          if [ -z "$CLIENT_UUID" ]; then
            echo "Creating Keycloak client '$SOGO_CLIENT_ID'..."
            kubectl exec "$KEYCLOAK_POD" -n {{ .Release.Namespace }} -- \
              /opt/keycloak/bin/kcadm.sh create clients -r "$KEYCLOAK_REALM" -f - <<ENDJSON
          {
            "clientId": "$SOGO_CLIENT_ID",
            "enabled": true,
            "publicClient": false,
            "secret": "$CLIENT_SECRET",
            "protocol": "openid-connect",
            "standardFlowEnabled": true,
            "redirectUris": ["*"],
            "serviceAccountsEnabled": true
          }
          ENDJSON
          else
            echo "Updating existing client '$SOGO_CLIENT_ID' (UUID: $CLIENT_UUID)..."
            kubectl exec "$KEYCLOAK_POD" -n {{ .Release.Namespace }} -- \
              /opt/keycloak/bin/kcadm.sh update clients/"$CLIENT_UUID" -r "$KEYCLOAK_REALM" -f - <<ENDJSON
          {
            "publicClient": false,
            "secret": "$CLIENT_SECRET"
          }
          ENDJSON
          fi

          echo "Creating/updating Kubernetes Secret '$SOGO_OIDC_SECRET_NAME'..."
          kubectl create secret generic "$SOGO_OIDC_SECRET_NAME" \
            -n {{ .Release.Namespace }} \
            --from-literal=oidc-client-secret="$CLIENT_SECRET" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "Successfully provisioned Keycloak client '$SOGO_CLIENT_ID' and OIDC secret."
{{- end }}
