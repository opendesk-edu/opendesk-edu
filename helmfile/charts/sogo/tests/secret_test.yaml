suite: test secret
templates:
  - secret.yaml
tests:
  - it: should create Secret with correct name
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sogo
      - equal:
          path: type
          value: Opaque
  - it: should contain oidc-client-secret in stringData
    asserts:
      - exists:
          path: stringData.oidc-client-secret
  - it: should contain ldap-bind-password in stringData
    asserts:
      - exists:
          path: stringData.ldap-bind-password
  - it: should contain db-password in stringData
    asserts:
      - exists:
          path: stringData.db-password
  - it: should use custom oidc-client-secret when provided
    set:
      sogo.oidc.clientSecret: "custom-secret"
    asserts:
      - equal:
          path: stringData.oidc-client-secret
          value: "custom-secret"
  - it: should use custom ldap-bind-password when provided
    set:
      sogo.ldap.bindPassword: "ldap-pass"
    asserts:
      - equal:
          path: stringData.ldap-bind-password
          value: "ldap-pass"
  - it: should use custom db-password when provided
    set:
      sogo.db.password: "db-pass"
    asserts:
      - equal:
          path: stringData.db-password
          value: "db-pass"
