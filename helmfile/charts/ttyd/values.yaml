---
replicaCount: 1
image:
  repository: tsl0922/ttyd
  tag: "1.7.7"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 7681
ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: haproxy
  hosts:
    - host: term.opendesk.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
extraArgs: []
nodeSelector: {}
tolerations: []
affinity: {}
