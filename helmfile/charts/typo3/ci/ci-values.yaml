typo3:
  enabled: true
  image: typo3/cms-core
  tag: "13.4"
  replicas: 1
  port: 80
  db:
    password: "typo3test"
  installToolPassword: "testpassword123"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  volumes:
    fileadmin:
      accessMode: ReadWriteOnce
      size: 1Gi
    var:
      accessMode: ReadWriteOnce
      size: 1Gi
ingress:
  enabled: false
  hosts:
    - host: typo3.local
      paths:
        - path: /
          pathType: Prefix
mariadb:
  enabled: true
  auth:
    rootPassword: "test"
    username: "typo3"
    password: "typo3test"
    database: "typo3"
