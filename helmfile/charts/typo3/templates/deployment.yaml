apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-typo3
  labels:
{{ include "typo3.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.typo3.replicas }}
  selector:
    matchLabels:
      typo3/server: "true"
{{ include "typo3.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        typo3/server: "true"
{{ include "typo3.labels" . | nindent 8 }}
    spec:
      initContainers:
        - name: typo3-init
          image: {{ .Values.typo3.image }}:{{ .Values.typo3.tag }}
          command: ["vendor/bin/typo3", "install:fixfolderstructure"]
          volumeMounts:
            - name: typo3-fileadmin
              mountPath: /var/www/html/fileadmin
            - name: typo3-var
              mountPath: /var/www/html/var
            - name: typo3-config
              mountPath: /var/www/html/config
      containers:
        - name: typo3
          image: {{ .Values.typo3.image }}:{{ .Values.typo3.tag }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 33
            runAsNonRoot: true
            runAsUser: 33
            seLinuxOptions: {}
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: {{ .Values.typo3.port }}
          env:
            - name: TYPO3_DB_HOST
              value: {{ include "typo3.dbHost" . | quote }}
            - name: TYPO3_DB_PORT
              value: {{ include "typo3.dbPort" . | quote }}
            - name: TYPO3_DB_USER
              value: {{ include "typo3.dbUser" . | quote }}
            - name: TYPO3_DB_PASS
              value: {{ include "typo3.dbPassword" . | quote }}
            - name: TYPO3_DB_NAME
              value: {{ include "typo3.dbName" . | quote }}
            - name: TYPO3_CONTEXT
              value: Production
          volumeMounts:
            - name: typo3-fileadmin
              mountPath: /var/www/html/fileadmin
            - name: typo3-var
              mountPath: /var/www/html/var
            - name: typo3-config
              mountPath: /var/www/html/config
            - name: typo3-typo3temp
              mountPath: /var/www/html/typo3temp
{{- if .Values.extraVolumeMounts }}
{{- toYaml .Values.extraVolumeMounts | nindent 12 }}
{{- end }}
          resources: {{ .Values.typo3.resources | toYaml | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      securityContext:
        sysctls:
          - name: net.ipv4.ip_unprivileged_port_start
            value: "0"
      volumes:
        - name: typo3-fileadmin
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-typo3-fileadmin
        - name: typo3-var
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-typo3-var
        - name: typo3-config
          configMap:
            name: {{ .Release.Name }}-typo3-config
        - name: typo3-typo3temp
          emptyDir: {}
{{- if .Values.extraVolumes }}
{{- toYaml .Values.extraVolumes | nindent 8 }}
{{- end }}
