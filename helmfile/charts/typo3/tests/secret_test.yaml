suite: Secret
templates:
  - secret.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should create a Secret
    asserts:
      - isKind:
          of: Secret

  - it: should have DB password
    asserts:
      - isNotNull:
          path: data["typo3-db-password"]

  - it: should have install tool password
    asserts:
      - isNotNull:
          path: data["typo3-install-tool-password"]
