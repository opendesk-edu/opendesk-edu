typo3:
  enabled: false

  image:
    repository: typo3/cms-core
    tag: "13.4"

  replicas: 1

  port: 80

  db:
    password: ""  # Set in production

  installToolPassword: ""  # Set in production

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  volumes:
    fileadmin:
      accessMode: ReadWriteOnce
      size: 10Gi
    var:
      accessMode: ReadWriteOnce
      size: 10Gi

ingress:
  enabled: false
  className: ""  # Set nginx or traefik if enabled
  annotations: {}
  hosts:
    - host: typo3.opendesk.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

mariadb:
  enabled: true
  auth:
    rootPassword: ""  # Set in production
    username: typo3
    password: ""  # Set in production
    database: typo3
