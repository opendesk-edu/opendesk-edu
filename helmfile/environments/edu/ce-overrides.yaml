# Helmfile state values that override CE defaults
# These are injected via --values when running CE's helmfile
# They override CE's default environment values

apps:
  # Disable CE apps that edu replaces or conflicts with
  oxAppSuite:
    enabled: false              # edu uses SOGo + Grommunio instead of OX
  nextcloud:
    enabled: false              # edu uses OpenCloud instead
  seaweedfs:
    enabled: false              # edu has its own seaweedfs deployment
  dovecot:
    enabled: false              # Grommunio handles its own mail stack
  postfix:
    enabled: false              # same
  # Keep nubus (UMS + Keycloak) but disable its embedded intercom-service
  # edu deploys its own intercom-service (forked chart with edu-specific fixes)
  nubus:
    intercomServiceEnabled: false
  # Enable SOGo (edu replaces OX with SOGo)
  sogo:
    enabled: true
  # Edu-specific apps
  intercom:
    enabled: true
  grommunio:
    enabled: true
  semesterProvisioning:
    enabled: true

# Edu-specific global config
global:
  domain: opendesk.hrz.uni-marburg.de
  mail_domain: uni-marburg.de

# CE Keycloak bootstrap — inject edu SAML clients via CE's custom clients mechanism
# CE reads functional.authentication.oidc.clients and injects into config.custom.clients
functional:
  authentication:
    oidc:
      clients:
        - name: "ilias-saml"
          clientId: "ilias-saml"
          protocol: "saml"
          clientAuthenticatorType: "client-secret"
          secret: {{ .Values.secrets.keycloak.clientSecret.iliasSaml | quote }}
          redirectUris:
            - "https://lms.{{ .Values.global.domain }}/*"
          rootUrl: "https://lms.{{ .Values.global.domain }}"
          adminUrl: "https://lms.{{ .Values.global.domain }}"
          consentRequired: false
          frontchannelLogout: true
          publicClient: false
          authorizationServicesEnabled: false
          attributes:
            saml.assertion.signature: "false"
            saml.force.post.binding: "true"
            saml.multivalued.roles: "false"
            saml.encrypt: "false"
            saml.server.signature: "true"
            saml.server.signature.keyinfo.ext: "false"
            saml.client.signature: "false"
            saml.authnstatement: "true"
            saml_name_id_format: "persistent"
            frontchannel.logout.url: "https://lms.{{ .Values.global.domain }}/Shibboleth.sso/Logout"
          protocolMappers:
            - name: "email"
              protocol: "saml"
              protocolMapper: "saml-user-property-mapper"
              consentRequired: false
              config:
                user.attribute: "email"
                attribute.name: "email"
                attribute.nameformat: "Basic"
            - name: "displayname"
              protocol: "saml"
              protocolMapper: "saml-user-property-mapper"
              consentRequired: false
              config:
                user.attribute: "displayName"
                attribute.name: "displayname"
                attribute.nameformat: "Basic"
            - name: "givenname"
              protocol: "saml"
              protocolMapper: "saml-user-property-mapper"
              consentRequired: false
              config:
                user.attribute: "firstName"
                attribute.name: "givenname"
                attribute.nameformat: "Basic"
            - name: "surname"
              protocol: "saml"
              protocolMapper: "saml-user-property-mapper"
              consentRequired: false
              config:
                user.attribute: "lastName"
                attribute.name: "surname"
                attribute.nameformat: "Basic"
        - name: "moodle-saml"
          clientId: "moodle-saml"
          protocol: "saml"
          clientAuthenticatorType: "client-secret"
          secret: {{ .Values.secrets.keycloak.clientSecret.moodleSaml | quote }}
          redirectUris:
            - "https://moodle.{{ .Values.global.domain }}/*"
          rootUrl: "https://moodle.{{ .Values.global.domain }}"
          adminUrl: "https://moodle.{{ .Values.global.domain }}"
          consentRequired: false
          frontchannelLogout: true
          publicClient: false
          authorizationServicesEnabled: false
          attributes:
            saml.assertion.signature: "false"
            saml.force.post.binding: "true"
            saml.multivalued.roles: "false"
            saml.encrypt: "false"
            saml.server.signature: "true"
            saml.server.signature.keyinfo.ext: "false"
            saml.client.signature: "false"
            saml.authnstatement: "true"
            saml_name_id_format: "persistent"
            frontchannel.logout.url: "https://moodle.{{ .Values.global.domain }}/Shibboleth.sso/Logout"
          protocolMappers:
            - name: "email"
              protocol: "saml"
              protocolMapper: "saml-user-property-mapper"
              consentRequired: false
              config:
                user.attribute: "email"
                attribute.name: "email"
                attribute.nameformat: "Basic"
            - name: "displayname"
              protocol: "saml"
              protocolMapper: "saml-user-property-mapper"
              consentRequired: false
              config:
                user.attribute: "displayName"
                attribute.name: "displayname"
                attribute.nameformat: "Basic"
            - name: "givenname"
              protocol: "saml"
              protocolMapper: "saml-user-property-mapper"
              consentRequired: false
              config:
                user.attribute: "firstName"
                attribute.name: "givenname"
                attribute.nameformat: "Basic"
            - name: "surname"
              protocol: "saml"
              protocolMapper: "saml-user-property-mapper"
              consentRequired: false
              config:
                user.attribute: "lastName"
                attribute.name: "surname"
                attribute.nameformat: "Basic"
        - name: "bbb-saml"
          clientId: "bbb-saml"
          protocol: "saml"
          clientAuthenticatorType: "client-secret"
          secret: {{ .Values.secrets.keycloak.clientSecret.bbbSaml | quote }}
          redirectUris:
            - "https://bbb.{{ .Values.global.domain }}/*"
            - "https://bbb.{{ .Values.global.domain }}/auth/saml2/callback"
          rootUrl: "https://bbb.{{ .Values.global.domain }}"
          adminUrl: "https://bbb.{{ .Values.global.domain }}"
          consentRequired: false
          frontchannelLogout: true
          publicClient: false
          authorizationServicesEnabled: false
          attributes:
            saml.assertion.signature: "false"
            saml.force.post.binding: "true"
            saml.multivalued.roles: "false"
            saml.encrypt: "false"
            saml.server.signature: "true"
            saml.server.signature.keyinfo.ext: "false"
            saml.client.signature: "false"
            saml.authnstatement: "true"
            saml_name_id_format: "persistent"
            frontchannel.logout.url: "https://bbb.{{ .Values.global.domain }}/Shibboleth.sso/Logout"
          protocolMappers:
            - name: "email"
              protocol: "saml"
              protocolMapper: "saml-user-property-mapper"
              consentRequired: false
              config:
                user.attribute: "email"
                attribute.name: "email"
                attribute.nameformat: "Basic"
            - name: "displayname"
              protocol: "saml"
              protocolMapper: "saml-user-property-mapper"
              consentRequired: false
              config:
                user.attribute: "displayName"
                attribute.name: "displayname"
                attribute.nameformat: "Basic"
            - name: "givenname"
              protocol: "saml"
              protocolMapper: "saml-user-property-mapper"
              consentRequired: false
              config:
                user.attribute: "firstName"
                attribute.name: "givenname"
                attribute.nameformat: "Basic"
            - name: "surname"
              protocol: "saml"
              protocolMapper: "saml-user-property-mapper"
              consentRequired: false
              config:
                user.attribute: "lastName"
                attribute.name: "surname"
